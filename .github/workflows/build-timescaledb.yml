name: Build TimescaleDB SSL Image

on:
  push:
    paths:
      - "docker/timescaledb-ssl/**"
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/timescaledb-ssl
          push: true
          tags: |
            ghcr.io/justar96/timescale-postgis-ssl:pg17-ts2.24
            ghcr.io/justar96/timescale-postgis-ssl:latest
