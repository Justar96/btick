openapi: 3.1.0
info:
  title: btick API
  description: |
    Real-time Bitcoin price oracle service for prediction market settlement.
    Aggregates prices from Binance, Coinbase, Kraken, and OKX using multi-venue median pricing.
  version: 1.0.0
  contact:
    name: Price Oracle Team

servers:
  - url: http://localhost:8080
    description: Development
  - url: https://price-oracle.example.com
    description: Production

tags:
  - name: Price
    description: Price data endpoints
  - name: Health
    description: System health endpoints
  - name: Auth
    description: API account endpoints
  - name: Metadata
    description: Symbol metadata endpoints

paths:
  /v1/price/latest:
    get:
      tags: [Price]
      summary: Get current canonical price
      description: Returns the latest canonical BTC/USD price from memory (lowest latency)
      operationId: getLatestPrice
      responses:
        '200':
          description: Current price
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LatestPrice'
        '503':
          description: No data available yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/price/settlement:
    get:
      tags: [Price]
      summary: Get settlement price
      description: |
        Returns the official settlement price at a specific 5-minute boundary.
        **Primary endpoint for prediction market resolution.**
      operationId: getSettlementPrice
      parameters:
        - name: ts
          in: query
          required: true
          description: Settlement timestamp (RFC3339). Must be on a 5-minute boundary.
          schema:
            type: string
            format: date-time
          example: "2026-03-19T09:10:00Z"
      responses:
        '200':
          description: Settlement price
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementPrice'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingTs:
                  value: { "error": "ts parameter required (RFC3339 format, e.g. 2026-03-19T09:05:00Z)" }
                invalidFormat:
                  value: { "error": "invalid ts format, use RFC3339 (e.g. 2026-03-19T09:05:00Z)" }
                invalidBoundary:
                  value: { "error": "ts must be on a 5-minute boundary (e.g. 09:05:00, 09:10:00)" }
                futureTs:
                  value: { "error": "ts cannot be in the future" }
        '404':
          description: No data for timestamp
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '425':
          description: Price not yet finalized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/price/snapshots:
    get:
      tags: [Price]
      summary: Query historical snapshots
      description: Returns 1-second snapshots in a time range
      operationId: getSnapshots
      parameters:
        - name: start
          in: query
          required: true
          description: Start time (RFC3339)
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          description: End time (RFC3339), defaults to now
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: List of snapshots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Snapshot'

  /v1/price/ticks:
    get:
      tags: [Price]
      summary: Query recent price ticks
      description: Returns recent canonical price change events
      operationId: getTicks
      parameters:
        - name: limit
          in: query
          required: false
          description: Number of ticks to return
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: List of ticks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tick'

  /v1/price/raw:
    get:
      tags: [Price]
      summary: Query raw exchange data
      description: Returns raw tick data from individual exchanges (for auditing)
      operationId: getRawTicks
      parameters:
        - name: source
          in: query
          required: false
          description: Filter by source
          schema:
            type: string
            enum: [binance, coinbase, kraken, okx]
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: List of raw events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RawEvent'

  /v1/health:
    get:
      tags: [Health]
      summary: System health check
      operationId: getHealth
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /v1/health/feeds:
    get:
      tags: [Health]
      summary: Per-source feed health
      operationId: getFeedHealth
      responses:
        '200':
          description: Feed health status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeedHealth'

  /v1/auth/signup:
    post:
      tags: [Auth]
      summary: Create an API account
      description: Creates a new API account and returns a generated API key when signup is enabled.
      operationId: signupAPIAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIAccount'
                  - type: object
                    required: [api_key]
                    properties:
                      api_key:
                        type: string
                        description: Generated API key. Returned only at signup time.
                        example: btk_0123456789abcdef
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Account already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Database unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current API account
      description: Returns the account associated with the supplied API key.
      operationId: getCurrentAPIAccount
      security:
        - ApiKeyHeader: []
        - BearerAuth: []
      responses:
        '200':
          description: Current account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIAccount'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Database unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/symbols:
    get:
      tags: [Health]
      summary: List configured symbols
      description: Returns the list of canonical symbols configured on this instance
      operationId: getSymbols
      responses:
        '200':
          description: List of canonical symbols
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["BTC/USD", "ETH/USD"]

  /v1/metadata:
    get:
      tags: [Metadata]
      summary: Get symbol metadata
      description: Returns UI and product metadata for a canonical symbol.
      operationId: getSymbolMetadata
      parameters:
        - name: symbol
          in: query
          required: false
          description: Canonical symbol such as BTC/USD. Defaults to the first configured symbol.
          schema:
            type: string
      responses:
        '200':
          description: Symbol metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SymbolMetadata'
        '404':
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    SignupRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: operator@example.com
        name:
          type: string
          example: Ops Team

    APIAccount:
      type: object
      required: [account_id, email, tier, api_key_prefix, active, created_at]
      properties:
        account_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        tier:
          type: string
          example: starter
        api_key_prefix:
          type: string
          example: btk_12345678
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time

    SymbolMetadata:
      type: object
      required: [symbol, base_asset, quote_asset, product_type, product_sub_type, product_name, market_hours, feed_id]
      properties:
        symbol:
          type: string
          example: BTC/USD
        base_asset:
          type: string
          example: BTC
        quote_asset:
          type: string
          example: USD
        product_type:
          type: string
          example: price
        product_sub_type:
          type: string
          example: reference
        product_name:
          type: string
          example: BTC/USD-RefPrice-DS-Premium-Global-003
        market_hours:
          type: string
          example: 24/7
        feed_id:
          type: string
          example: btick-refprice-btc-usd

    LatestPrice:
      type: object
      required: [symbol, ts, price, basis, source_count]
      properties:
        symbol:
          type: string
          example: "BTC/USD"
        ts:
          type: string
          format: date-time
          description: Timestamp of the price event
        price:
          type: string
          description: Canonical price (decimal string)
          example: "70105.45"
        basis:
          type: string
          enum: [median_trade, median_mixed, single_trade, single_midpoint, carry_forward]
          description: How the price was computed
        is_stale:
          type: boolean
          description: True if data is outdated
        is_degraded:
          type: boolean
          description: True if fewer than minimum sources
        quality_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Data quality metric
        source_count:
          type: integer
          description: Number of sources used
        sources_used:
          type: array
          items:
            type: string
          example: ["binance", "coinbase", "kraken"]

    SettlementPrice:
      type: object
      required: [settlement_ts, symbol, price, status, basis]
      properties:
        settlement_ts:
          type: string
          format: date-time
          description: The settlement timestamp (5-minute boundary)
        symbol:
          type: string
          example: "BTC/USD"
        price:
          type: string
          description: Official settlement price
          example: "70105.45"
        status:
          type: string
          enum: [confirmed, degraded, stale]
          description: |
            - confirmed: High quality, safe for auto-settlement
            - degraded: Fewer sources, use with caution
            - stale: No fresh data, manual review recommended
        basis:
          type: string
          enum: [median_trade, median_mixed, single_trade, single_midpoint, carry_forward]
        quality_score:
          type: number
          format: float
        source_count:
          type: integer
        sources_used:
          type: array
          items:
            type: string
        finalized_at:
          type: string
          format: date-time
          description: When the snapshot was finalized
        source_details:
          type: string
          format: byte
          description: Base64-encoded JSON with per-source details (for audit)

    Snapshot:
      type: object
      properties:
        ts_second:
          type: string
          format: date-time
        symbol:
          type: string
        price:
          type: string
        basis:
          type: string
        is_stale:
          type: boolean
        is_degraded:
          type: boolean
        quality_score:
          type: number
        source_count:
          type: integer
        sources_used:
          type: array
          items:
            type: string
        finalized_at:
          type: string
          format: date-time

    Tick:
      type: object
      properties:
        ts:
          type: string
          format: date-time
        symbol:
          type: string
        price:
          type: string
        basis:
          type: string
        is_stale:
          type: boolean
        is_degraded:
          type: boolean
        quality_score:
          type: number
        source_count:
          type: integer
        sources_used:
          type: array
          items:
            type: string

    RawEvent:
      type: object
      properties:
        event_id:
          type: string
          format: uuid
        source:
          type: string
          enum: [binance, coinbase, kraken, okx]
        event_type:
          type: string
          enum: [trade, ticker]
        exchange_ts:
          type: string
          format: date-time
        recv_ts:
          type: string
          format: date-time
        price:
          type: string
        size:
          type: string
        side:
          type: string
          enum: [buy, sell]
        trade_id:
          type: string

    Health:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, stale, no_data]
        timestamp:
          type: string
          format: date-time
        dependencies:
          type: object
          properties:
            database:
              type: object
              properties:
                ready:
                  type: boolean
        latest_price:
          type: string
        latest_ts:
          type: string
          format: date-time
        source_count:
          type: integer

    FeedHealth:
      type: object
      properties:
        source:
          type: string
        conn_state:
          type: string
          enum: [connected, connecting, disconnected]
        last_message_ts:
          type: string
          format: date-time
        last_trade_ts:
          type: string
          format: date-time
        median_lag_ms:
          type: integer
        reconnect_count_1h:
          type: integer
        consecutive_errors:
          type: integer
        stale:
          type: boolean
        updated_at:
          type: string
          format: date-time

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Error message

    # WebSocket message schemas (informational — not served via REST)
    WSMessage:
      type: object
      description: |
        Base schema for all WebSocket messages. The `type` field determines which
        additional fields are present.
      required: [type, ts]
      properties:
        type:
          type: string
          enum: [welcome, latest_price, snapshot_1s, heartbeat]
          description: Message type
        seq:
          type: integer
          format: uint64
          description: |
            Monotonically increasing sequence number. Present on all broadcast
            messages (latest_price, snapshot_1s, heartbeat). Absent on per-connection
            messages (welcome, initial_state). Clients detect gaps to know when
            messages were missed.
        ts:
          type: string
          format: date-time
          description: Timestamp of the event or server time
        price:
          type: string
          description: Canonical price (decimal string). Present on latest_price and snapshot_1s.
        basis:
          type: string
          enum: [median_trade, median_mixed, single_trade, single_midpoint, carry_forward]
        is_stale:
          type: boolean
        quality_score:
          type: string
          description: Quality metric as decimal string
        source_count:
          type: integer
        sources_used:
          type: array
          items:
            type: string
        message:
          type: string
          description: |
            Context for special messages:
            - `"btick/v1"` on welcome
            - `"initial_state"` on first latest_price after connect
            - `"no_data_yet"` if no price data available on connect

    WSClientAction:
      type: object
      description: |
        Client-to-server message for subscription management.
        Unknown actions, types, and symbols are silently ignored (forward-compatible).
      required: [action]
      properties:
        action:
          type: string
          enum: [subscribe, unsubscribe]
          description: Subscribe or unsubscribe from message types and symbols
        types:
          type: array
          items:
            type: string
            enum: [snapshot_1s, latest_price, heartbeat]
          description: Message types to subscribe/unsubscribe
        symbols:
          type: array
          items:
            type: string
          description: |
            Optional canonical symbols to subscribe/unsubscribe.
            Omit to keep all symbols enabled.
