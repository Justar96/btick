symbols:
  - canonical: BTC/USD
    base_asset: BTC
    quote_asset: USD
    product_type: price
    product_sub_type: reference
    product_name: BTC/USD-RefPrice-DS-Premium-Global-003
    market_hours: 24/7
    feed_id: btick-refprice-btc-usd
    sources:
      - name: binance
        enabled: true
        ws_url: "wss://stream.binance.com:9443/stream?streams=btcusdt@trade/btcusdt@bookTicker"
        native_symbol: btcusdt
        use_book_ticker_fallback: true
        ping_interval_sec: 15
        max_conn_lifetime_sec: 86000

      - name: coinbase
        enabled: true
        ws_url: "wss://ws-feed.exchange.coinbase.com"
        native_symbol: BTC-USD
        ping_interval_sec: 25
        max_conn_lifetime_sec: 0

      - name: kraken
        enabled: true
        ws_url: "wss://ws.kraken.com/v2"
        native_symbol: BTC/USD
        use_ticker_fallback: true
        ping_interval_sec: 30
        max_conn_lifetime_sec: 0

      - name: okx
        enabled: true
        ws_url: "wss://ws.okx.com:8443/ws/v5/public"
        native_symbol: BTC-USDT
        ping_interval_sec: 20
        max_conn_lifetime_sec: 0

  - canonical: ETH/USD
    base_asset: ETH
    quote_asset: USD
    product_type: price
    product_sub_type: reference
    product_name: ETH/USD-RefPrice-DS-Premium-Global-003
    market_hours: 24/7
    feed_id: btick-refprice-eth-usd
    sources:
      - name: binance
        enabled: true
        ws_url: "wss://stream.binance.com:9443/stream?streams=ethusdt@trade/ethusdt@bookTicker"
        native_symbol: ethusdt
        use_book_ticker_fallback: true
        ping_interval_sec: 15
        max_conn_lifetime_sec: 86000

      - name: coinbase
        enabled: true
        ws_url: "wss://ws-feed.exchange.coinbase.com"
        native_symbol: ETH-USD
        ping_interval_sec: 25
        max_conn_lifetime_sec: 0

      - name: kraken
        enabled: true
        ws_url: "wss://ws.kraken.com/v2"
        native_symbol: ETH/USD
        use_ticker_fallback: true
        ping_interval_sec: 30
        max_conn_lifetime_sec: 0

      - name: okx
        enabled: true
        ws_url: "wss://ws.okx.com:8443/ws/v5/public"
        native_symbol: ETH-USDT
        ping_interval_sec: 20
        max_conn_lifetime_sec: 0

server:
  http_addr: ":8080"
  ws_path: /ws/price

database:
  dsn: "${DATABASE_URL}"
  max_conns: 20
  run_migrations: true

pricing:
  mode: multi_venue_median
  minimum_healthy_sources: 2
  trade_freshness_window_ms: 5000
  quote_freshness_window_ms: 1000
  late_arrival_grace_ms: 250
  outlier_reject_pct: 1.0
  carry_forward_max_seconds: 10
  settlement_reaggregation_window_ms: 5000

storage:
  # Go pruner fallback (inactive when TimescaleDB is present).
  # Actual retention: 3 hours via TimescaleDB policies in migrations/001_init.sql.
  raw_retention_days: 1
  snapshots_retention_days: 1
  batch_insert_max_rows: 1000
  batch_insert_max_delay_ms: 200

health:
  source_stale_after_ms: 3000
  canonical_stale_after_ms: 3000
